<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="brand-lockup">
                <div class="brand-mark">
                    <img src="./assets/github-logo.png" alt="GitHub Issues Tracker logo">
                </div>
                <p class="eyebrow">Phi Lab Assignment</p>
                <h1>GitHub Issues Tracker</h1>
                <p class="auth-subtitle">Sign in with the admin account to review, search, and inspect project issues.</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <label class="field">
                    <span>Username</span>
                    <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username">
                </label>

                <label class="field">
                    <span>Password</span>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password">
                </label>

                <p id="loginError" class="form-error" aria-live="polite"></p>

                <button type="submit" class="primary-button">Sign In</button>
            </form>

            <button id="demoButton" class="demo-card" type="button">
                <span class="demo-label">Demo Credentials</span>
                <span><strong>Username:</strong> admin</span>
                <span><strong>Password:</strong> admin123</span>
                <span class="demo-hint">Click to autofill the form.</span>
            </button>
        </section>
    </main>

    <script src="./login.js"></script>
</body>
</html>
