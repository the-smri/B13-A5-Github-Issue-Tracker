<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="flex flex-col mx-auto max-w-[520px] max-h-[740px] my-10 justify-center items-center fieldset bg-base-200 border-base-300 rounded-box w-xs border">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="mx-auto w-20" />
        <fieldset class="">
    <h2 class="fieldset-legend justify-self-center text-center font-semibold text-2xl">GitHub Issues Tracker</h2>
    <p class="fieldset-legend justify-self-center text-center opacity-70">Sign in to manage your issues</p>

  <label class="label">Username</label>
  <input type="text" class="input" placeholder="Enter Username" />
  <p class="text-[#4A00FF] mb-4">Default: admin</p>

  <label class="label">Password</label>
  <input type="password" class="input" placeholder="Enter Password" />
  <p class="text-[#4A00FF] mb-4">Default: admin123</p>
  <button class="btn btn-primary w-full mb-4">Sign In</button>
  <p class="justify-self-center text-center">OR</p>
  <hr class="w-full border-t border-base-300" />

  <p class="justify-self-center text-center mb-4">Demo Credentials:</p>
  <p class="justify-self-center text-center"><span class="font-semibold"
    >Username:</span> admin</p>
  <p class="justify-self-center text-center"><span class="font-semibold">Password:</span> admin123</p>
</fieldset>
    </header>
</body>
</html>
