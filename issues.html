<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="min-h-screen"> 
    <header class="sticky border bg-white/90 backdrop-blur">
        <div class="mx-auto flex w-full max-w-[1400px] flex-col gap-4 px-4 py-[18px] md:px-7 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center gap-[14px]">
                <div class="grid h-[52px] w-[52px] place-items-center rounded-2xl ">
                    <img src="./assets/github-logo.png" alt="GitHub Issues Tracker logo" class="h-10 w-10 object-contain">
                </div>
                <div>
                    <h1 class="text-xl font-extrabold leading-tight md:text-[1.55rem]">GitHub Issues Tracker</h1>
                </div>
            </div>

            <div class="flex w-full flex-col gap-3 lg:w-auto lg:flex-row lg:items-center">
                <form id="searchForm" class="flex w-full flex-col gap-2 sm:min-w-[420px] sm:flex-row">
                    <input id="searchInput" type="" placeholder=" Search issues..." aria-label="Search issues" class="w-full min-w-0 rounded-lg">
                    <button type="" class="secondary-button btn btn-primary">+ New Issues</button>
                </form>
                <button id="logoutButton" class="ghost-button inline-flex min-h-[50px] items-center justify-center rounded-2xl text-black" type="button">Logout</button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 md:px-4 md:py-9">
        <section class="rounded-3xl border border-slate-200/80 bg-white/85 p-[18px] shadow-lg shadow-slate-900/5 backdrop-blur">
            <div class="flex flex-wrap gap-2.5" role="tablist" aria-label="Issue filters">
                <button class="tab-button is-active inline-flex min-h-11 min-w-[92px] items-center justify-center rounded-xl bg-blue-400 px-5 text-sm font-bold text-white" type="button" data-tab="all" role="tab" aria-selected="true">All</button>
                <button class="tab-button inline-flex min-h-11 min-w-[92px] items-center justify-center rounded-xl bg-white px-5 text-sm font-bold" type="button" data-tab="open" role="tab" aria-selected="false">Open</button>
                <button class="tab-button inline-flex min-h-11 min-w-[92px] items-center justify-center rounded-xl bg-white px-5 text-sm font-bold " type="button" data-tab="closed" role="tab" aria-selected="false">Closed</button>
            </div>
        </section>

        <section class="mt-[14px] flex flex-col gap-5 rounded-3xl border border-slate-200/80 bg-white/85 px-5 py-6 shadow-lg shadow-slate-900/5 backdrop-blur lg:flex-row lg:items-center lg:justify-between lg:px-[26px]">
            <div class="flex items-center gap-4">
                <div class="grid h-[52px] w-[52px] shrink-0 place-items-center rounded-full bg-blue-500">
                </div>
                <div>
                    <h2 id="summaryCount" class="text-xl font-bold md:text-2xl">0 Issues</h2>
                    <p id="summaryText" class="mt-1 text-slate-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3" aria-label="Issue status counts">
                <span class="inline-flex items-center gap-2 rounded-full px-[14px] py-3 text-[1rem] font-semibold">
                    <i class="inline-block h-2.5 w-2.5 rounded-full bg-emerald-500"></i>
                    <strong id="openCount" class="text-[1rem]]">0</strong>
                    Open
                </span>
                <span class="inline-flex items-center gap-2 rounded-full px-[14px] py-3 text-[1rem] font-semibold">
                    <i class="inline-block h-2.5 w-2.5 rounded-full bg-violet-500"></i>
                    <strong id="closedCount" class="text-[1rem]">0</strong>
                    Closed
                </span>
            </div>
        </section>

        <section class="mt-5">
            <div id="loadingState" class="mb-[18px] hidden rounded-3xl border border-dashed border-brand/20 bg-white/80 px-6 py-10 text-center" aria-hidden="true">
                <span class="inline-block h-11 w-11 animate-spin rounded-full border-4" aria-hidden="true"></span>
                <p class="text-slate-500">Loading issues...</p>
            </div>

            <div id="feedbackState" class="mb-[18px] hidden rounded-3xl border border-dashed border-brand/20 bg-white/80 px-6 py-10 text-center" aria-hidden="true"></div>

            <div id="issuesGrid" class="grid grid-cols-1 gap-[18px] md:grid-cols-2 xl:grid-cols-4" aria-live="polite"></div>
        </section>
    </main>

    <div id="issueModal" class="fixed inset-0 z-40 hidden  p-6" aria-hidden="true">
        <div class="relative max-h-[90vh] w-full max-w-3xl overflow-auto rounded-[26px] bg-white p-5 shadow-2xl sm:p-10" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="modalCloseButton" class="absolute right-[18px] top-[18px] inline-flex h-[42px] w-[42px] items-center justify-center rounded-full " type="button" aria-label="Close modal">&times;</button>

            <div id="modalLoading" class="hidden" aria-hidden="true">
                <span class="inline-block h-11 w-11 animate-spin rounded-full border-4 " aria-hidden="true"></span>
                <p class="text-slate-500">Loading issue details...</p>
            </div>

            <div id="modalContent"></div>
        </div>
    </div>

    <div class="hidden">
        <article class="issue-card rounded-3xl border border-slate-200 border-t-4 border-t-emerald-500 bg-white/95 p-[18px] pb-5 shadow-lg"></article>
        <article class="issue-card rounded-3xl border border-slate-200 border-t-4 border-t-violet-500 bg-white/95 p-[18px] pb-5 shadow-lg"></article>
        <article class=""></article>
        <span class="inline-flex items-center justify-center rounded-full bg-emerald-100 px-2.5 py-1 text-[11px] font-extrabold "></span>                         
        <span class="inline-flex items-center justify-center rounded-full bg-violet-100 px-2.5 py-1 text-[11px] font-extrabold"></span>
        <span class="inline-flex items-center justify-center rounded-full bg-rose-100 px-2.5 py-1 text-[11px] font-extrabold "></span>
        <span class="inline-flex items-center justify-center rounded-full bg-amber-100 px-2.5 py-1 text-[11px] font-extrabold "></span>
        <button class="inline-flex min-h-[54px] items-center justify-center rounded-2xl bg-gradient-to-r from-brand to-[#6f43ff] px-6 py-3 text-sm font-bold text-white shadow-lg "></button>
        <div class="mt-4 flex flex-wrap gap-2"></div>
        <div class="mt-[18px] flex items-start justify-between gap-3  pt-[14px]"></div>
        <span class="mb-1 block text-[0.75rem] font-bold "></span>
        <span class="block font-semibold text-slate-900"></span>
        <h3 class="mb-2 text-xl font-bold text-slate-900"></h3>
        <h2 class="text-lg font-bold"></h2> 
        <p class="mb-5"></p>
        <p class="min-h-[72px] overflow-hidden text-sm leading-6"></p>
        <div class="flex flex-wrap items-center gap-3 text-sm font-semibold "></div>
        <p class="text-lg leading-8  sm:text-xl"></p>
        <div class="mt-7 grid grid-cols-1 gap-4 md:grid-cols-2"></div>
        <article class="rounded-3xl bg-slate-50 p-5"></article>
        <span class="mb-2.5 block"></span>
        <span class="block text-lg font-bold"></span>
        <p class="mt-5"></p>
        <div class="mt-7 flex justify-end"></div>
    </div>

    <script src="./issues.js"></script>
</body>
</html>
