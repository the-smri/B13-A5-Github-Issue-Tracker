<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="dashboard-page">
    <header class="topbar">
        <div class="brand-inline">
            <div class="brand-inline-mark">
                <img src="./assets/github-logo.png" alt="GitHub Issues Tracker logo">
            </div>
            <div>
                <p class="topbar-kicker">Project Board</p>
                <h1>GitHub Issues Tracker</h1>
            </div>
        </div>

        <div class="topbar-actions">
            <form id="searchForm" class="search-shell">
                <input id="searchInput" type="search" placeholder="Search issues..." aria-label="Search issues">
                <button type="submit" class="secondary-button">Search</button>
            </form>
            <button id="logoutButton" class="ghost-button" type="button">Logout</button>
        </div>
    </header>

    <main class="dashboard-shell">
        <section class="surface surface-tabs">
            <div class="tab-list" role="tablist" aria-label="Issue filters">
                <button class="tab-button is-active" type="button" data-tab="all" role="tab" aria-selected="true">All</button>
                <button class="tab-button" type="button" data-tab="open" role="tab" aria-selected="false">Open</button>
                <button class="tab-button" type="button" data-tab="closed" role="tab" aria-selected="false">Closed</button>
            </div>
        </section>

        <section class="surface summary-panel">
            <div class="summary-copy">
                <div class="summary-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm0 2.4a7.59 7.59 0 0 1 5.21 2.06l-1.72 1.72A5.21 5.21 0 0 0 12 6.8Zm-6.81 5.8a7.49 7.49 0 0 1 1.73-3.73l1.72 1.72a5.16 5.16 0 0 0-1.16 2.51Zm1.73 7.34a7.49 7.49 0 0 1-1.73-3.74h2.29a5.16 5.16 0 0 0 1.16 2.51Zm5.08 2.06a7.59 7.59 0 0 1-5.21-2.06l1.72-1.72A5.21 5.21 0 0 0 12 17.2Zm0-5.1A2.5 2.5 0 1 1 14.5 12 2.5 2.5 0 0 1 12 14.5Zm3.49 3.04 1.72 1.72A7.59 7.59 0 0 1 12 19.6v-2.4a5.21 5.21 0 0 0 3.49-1.66Zm1.03-3.74a5.16 5.16 0 0 0-1.16-2.51l1.72-1.72a7.49 7.49 0 0 1 1.73 3.73Z"></path>
                    </svg>
                </div>
                <div>
                    <h2 id="summaryCount">0 Issues</h2>
                    <p id="summaryText">Track and manage your project issues.</p>
                </div>
            </div>

            <div class="status-legend" aria-label="Issue status counts">
                <span class="legend-pill open">
                    <i></i>
                    <strong id="openCount">0</strong>
                    Open
                </span>
                <span class="legend-pill closed">
                    <i></i>
                    <strong id="closedCount">0</strong>
                    Closed
                </span>
            </div>
        </section>

        <section class="content-section">
            <div id="loadingState" class="state-card loading-state" hidden>
                <span class="spinner" aria-hidden="true"></span>
                <p>Loading issues...</p>
            </div>

            <div id="feedbackState" class="state-card" hidden></div>

            <div id="issuesGrid" class="issues-grid" aria-live="polite"></div>
        </section>
    </main>

    <div id="issueModal" class="modal-backdrop" hidden>
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="modalCloseButton" class="modal-close" type="button" aria-label="Close modal">×</button>

            <div id="modalLoading" class="modal-loading" hidden>
                <span class="spinner" aria-hidden="true"></span>
                <p>Loading issue details...</p>
            </div>

            <div id="modalContent"></div>
        </div>
    </div>

    <script src="./issues.js"></script>
</body>
</html>
